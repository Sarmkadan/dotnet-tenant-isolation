version: '3.8'

services:
  # ASP.NET Core API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenant-isolation-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=mssql;
        Database=TenantIsolationDb;
        User Id=sa;
        Password=YourStrong@Pass123;
        TrustServerCertificate=true;
      TenantIsolation__AutoMigrate: "true"
      TenantIsolation__EnableAuditLogging: "true"
      TenantIsolation__CacheDurationMinutes: "60"
      TenantIsolation__TenantIdentificationStrategy: "Header"
      TenantIsolation__DefaultIsolationStrategy: "RowLevelSecurity"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - tenant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tenant-isolation-mssql
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - tenant-network
    restart: unless-stopped
    healthcheck:
      test: [
        "CMD",
        "/opt/mssql-tools18/bin/sqlcmd",
        "-S",
        "localhost",
        "-U",
        "sa",
        "-P",
        "YourStrong@Pass123",
        "-Q",
        "SELECT 1"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mssql-data:
    driver: local

networks:
  tenant-network:
    driver: bridge
